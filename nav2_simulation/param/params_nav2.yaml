controller_server:
  ros__parameters:
    use_sim_time: True                     # add
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    # progress_checker: 진행 확인. 로봇이 어딘가에 끼어서 못 움직이는지 감시.
    # - movement_time_allowance: 해당 시간안에 벗어나지 못하면 진행 불가로 판단. 복구 행동 호출.
    # goal_checker: 목표 도달 확인. 로봇이 목표점에 도착했는지 판단.
    # - xy_goal_tolerance: [m] 해당 반경 안에 들어오면 도착으로 간주.
    # - yaw_goal_tolerance: [rad] 해당 각도 차이 이내면 정렬된 것으로 간주.
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]
    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 1.0
    # Controller parameters
    # FollowPath:
    #   plugin: "lyapunov_kinematics_controller::LyapunovKinematicsController"
    #   debug_trajectory_details: True
    #   kx: 0.6
    #   ky: 0.5
    #   ktheta: 1.0
    #   desired_linear_vel: 0.2
    #   lookahead_dist: 0.4
    #   max_angular_vel: 1.0
    #   max_steer_angle: 1.047
    #   transform_tolerance: 0.1
    FollowPath:
      plugin: "mpc_ufrws_controller::MpcUFRWSController"
      # ── MPC 파라미터 ───────────────────────────
      desired_linear_vel: 0.25
      lookahead_dist: 0.3
      control_period: 0.01         # 100 [Hz]
      prediction_horizon: 10       # 예측 구간
      max_steer_angle: 180.0       # [deg]
      # ── cost function 가중치 ───────────────────
      ## 상태 오차 가중치
      Q_y: 200.0                  # 횡방향 오차 가중치. 값이 클수록 경로 중앙 유지하려고 함
      Q_phi: 10.0                # 선수각 오차 가중치. 값이 클수록 차체 방향 유지하려고 함 (crab walking)
      ## 제어 입력 가중치
      R_u: 0.1                    # 조향각 크기 페널티. 값이 클수록 조향각 변화 작음
      R_delta: 5.0                # 조향각 변화량 페널티. 값이 클수록 조향 속도 변화 작음
      # ── NLopt 최적화 가중치 ─────────────────────
      opt_max_eval: 100           # 실시간 보장을 위한 함수 평가 횟수 상한
      opt_ftol_rel: 1.0e-6        # 비용 함수 상대 수렴 허용치
      opt_xtol_rel: 1.0e-6        # 변수 상대 수렴 허용치
      opt_grad_eps: 1.0e-5        # 유한 차분 스텝 크기
      # ── TF ───────────────────────────────────
      transform_tolerance: 0.1
    # FollowPath:
    #   plugin: "nav2_mppi_controller::MPPIController"
    #   time_steps: 56
    #   model_dt: 0.05
    #   batch_size: 2000
    #   vx_std: 0.2
    #   vy_std: 0.0
    #   wz_std: 0.4
    #   vx_max: 0.5
    #   vx_min: -0.5
    #   vy_max: 0.0
    #   wz_max: 1.5
    #   ax_max: 3.5
    #   ax_min: -3.5
    #   ay_min: 0.0
    #   ay_max: 2.0
    #   az_max: 4.0
    #   iteration_count: 1
    #   temperature: 0.3
    #   gamma: 0.015
    #   motion_model: "Ackermann"
    #   visualize: false
    #   reset_period: 1.0 # (only in Humble)
    #   regenerate_noises: false
    #   TrajectoryVisualizer:
    #     trajectory_step: 5
    #     time_step: 3
    #   TrajectoryValidator:
    #     plugin: "mppi::DefaultOptimalTrajectoryValidator"
    #     collision_lookahead_time: 2.0
    #     consider_footprint: false
    #   AckermannConstraints:
    #     min_turning_r: 0.2
    #   critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
    #   ConstraintCritic:
    #     enabled: true
    #     cost_power: 1
    #     cost_weight: 4.0
    #   GoalCritic:
    #     enabled: true
    #     cost_power: 1
